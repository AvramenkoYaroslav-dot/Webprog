<!DOCTYPE html>
<html lang="uk" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практичне завдання 3: Адаптивний Bootstrap 4 (Фінал)</title>
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <style>
        /* 1. Вимога: Блоки повинні повністю заповнювати весь вільний простір екрану */
        html, body {
            height: 100%;
        }

        /* 2. Спеціальні стилі для блоків */
        .custom-block {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            /* Вимога: Рамка 1px сірого або світло-сірого кольору */
            border: 1px solid #cccccc; 
            /* Для мобільного режиму (< 576px) */
            min-height: 33.33vh; 
        }

        /* 3. Вимога: Колір блоків відповідно до зразка */
        .bg-blue-custom { background-color: #3f83c1 !important; } /* Синій (#1) */
        .bg-yellow-custom { background-color: #ffc400 !important; } /* Жовтий (#2) */
        .bg-red-custom { background-color: #c4383c !important; } /* Червоний (#3) */

        /* Для усунення стандартних відступів Bootstrap */
        .row { 
            margin-left: 0; 
            margin-right: 0; 
        }

        /* Забезпечення, що row займає повну висоту */
        .main-row {
            height: 100%;
            display: flex; 
            flex-wrap: wrap; 
        }
        
        /* Розтягування блоків на ПК-версії (> 576px) */
        @media (min-width: 576px) {
            .col-sm-6 > .custom-block, 
            .col-sm-3 > .custom-block {
                height: 100%;
                /* Прибираємо min-height: 33.33vh, оскільки висота контролюється h-100 */
                min-height: auto; 
            }
        }
        
    </style>
</head>
<body class="h-100">

    <div class="container-fluid d-flex h-100 p-0">
        
        <div class="row main-row flex-grow-1">
            
            <div class="col-12 col-sm-6 p-0"> 
                <div class="custom-block bg-blue-custom">
                    #1
                </div>
            </div>

            <div class="col-12 col-sm-3 p-0"> 
                <div class="custom-block bg-yellow-custom">
                    #2
                </div>
            </div>

            <div class="col-12 col-sm-3 p-0"> 
                <div class="custom-block bg-red-custom">
                    #3
                </div>
            </div>
            
        </div>
        
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
