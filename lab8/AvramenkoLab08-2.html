<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Єдиний стиль для p та div</title>

    <style>
        body {
            font-family: 'Times New Roman', serif;
            margin: 20px;
            background-color: #f8f8f8;
        }

        /* Єдиний стиль для всіх абзаців (<p>) та всіх розділів (<div>) */
        p, div {
            border: 1px solid #cccccc; /* Світло-сіра рамка */
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px; /* Заокруглені кути */
            color: #333333; /* Темно-сірий колір тексту */
            line-height: 1.6; /* Міжрядковий інтервал */
        }
        
        /* Додатковий клас, щоб виділити розділи, але зберегти основний стиль */
        .main-container {
            background-color: #e6f0ff; /* Світло-блакитний фон для головних блоків */
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Стиль для заголовків, щоб не успадковували стилі p/div */
        h2 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <h2>Головний Розділ: Структура Документа</h2>

    <div class="main-container">
        <h3>Розділ 1. Вступ</h3>
        <p>
            Цей абзац знаходиться всередині першого контейнера `&lt;div&gt;`. Зверніть увагу, що він має однакове **базове оформлення** з іншими елементами: **рамку**, **відступи** та **колір тексту**, оскільки його стиль визначається селектором `p, div` у `<style>`.
        </p>
        <p>
            Це другий абзац у цьому ж розділі. Єдність стильового оформлення досягається завдяки **груповому селектору** в CSS: `p, div { ... }`. Це значно спрощує підтримку візуальної цілісності документа.
        </p>
    </div>
    
    <div class="main-container">
        <h3>Розділ 2. Деталізація</h3>
        <p>
            У цьому розділі ми продовжуємо демонструвати **спільне оформлення**. Кожен блок, будь то `&lt;p&gt;` чи `&lt;div&gt;`, візуально відділений і структурований єдиним способом, що покращує читабельність. 
        </p>
        <div style="background-color: #ffffff; border-color: #ff9900;">
            Це внутрішній `&lt;div&gt;`. Він успадковує загальні властивості (`padding`, `margin-bottom`, `line-height`), але ми додали йому **індивідуальний інлайновий стиль** для фону та рамки, щоб показати можливість **перевизначення** загальних стилів.
        </div>
    </div>

    <p>
        Це окремий абзац, який знаходиться **поза** будь-яким контейнером `&lt;div&gt;`. Проте він має **таке ж саме оформлення**, як і попередні розділи та абзаци, завдяки тому, що він включений у груповий селектор `p, div`. Це і є демонстрація **єдності стильового оформлення**.
    </p>

</body>
</html>
