<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сторінка з різними стилями тексту</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
        }

        /* Стиль для першого абзацу */
        .style-1 {
            color: #0056b3; /* Синій колір */
            font-size: 18px;
            font-weight: bold; /* Жирний */
            text-align: left;
            border-bottom: 2px dashed #0056b3;
            padding-bottom: 5px;
        }

        /* Стиль для другого абзацу */
        .style-2 {
            color: #28a745; /* Зелений колір */
            font-size: 14px;
            font-style: italic; /* Курсив */
            font-family: 'Georgia', serif;
            text-align: right;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>Приклад Сторінки з Різними Стилями Тексту</h1>
    
    <p class="style-1">
        Сьогодні ми досліджуємо можливості Cascading Style Sheets (CSS) для форматування тексту. Цей перший абзац є прикладом застосування стилю, визначеного у внутрішньому блоці `<style>`. Він має **жирний** шрифт, збільшений розмір і темно-синій колір, а також підкреслений пунктирною лінією знизу для візуального акценту.
    </p>

    <p class="style-2">
        *Другий абзац демонструє зовсім інший підхід.* Тут ми використали зелений колір тексту, менший розмір, курсив та іншу гарнітуру шрифту ('Georgia'). Вирівнювання тексту змінено на правий край, що створює візуальний контраст із попереднім абзацом. Це показує, як класи CSS можуть легко забезпечувати різноманітність оформлення в одному документі.
    </p>

    <p style="
        color: #dc3545; /* Червоний колір */
        font-size: 20px; 
        font-family: 'Verdana', sans-serif;
        text-decoration: underline; /* Підкреслення */
        text-align: center;
        background-color: #ffe0e3; /* Світло-червоний фон */
        padding: 10px;
        border-radius: 5px;
    ">
        А цей третій, заключний абзац, використовує **інлайнові стилі** (безпосередньо в тезі `p`). Він має найбільший розмір шрифту, виділений червоним кольором і підкресленням. Такий метод форматування варто використовувати лише для невеликої кількості унікальних елементів, оскільки він ускладнює централізоване керування стилями.
    </p>

</body>
</html>
