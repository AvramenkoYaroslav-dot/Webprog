<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навігація за файлами</title>
    <style>
        body {
            font-family: 'Verdana', sans-serif;
            text-align: center;
            margin: 20px;
            background-color: #f0f8ff; /* Ніжно-блакитний фон */
            color: #333;
        }
        h1 {
            color: #1e88e5; /* Синій заголовок */
            margin-bottom: 10px;
        }
        .intro-text {
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        .gallery {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 20px;
        }
        
        /* Стилізація окремого контейнера з фото */
        .photo-block {
            width: 300px; /* Фіксована ширина контейнера */
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            background-color: white;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .photo-block:hover {
            transform: translateY(-5px); /* Ефект підняття при наведенні */
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        /* Стиль для зображення, яке буде картою */
        .mappable-image {
            display: block;
            width: 100%;
            height: 200px; /* Фіксована висота */
            object-fit: cover; /* Обрізає, щоб помістилося */
        }

        .photo-caption {
            padding: 15px 10px;
            font-weight: bold;
            font-size: 1.2em;
            color: #007bff;
        }
        
        /* Стилізація карти-зображення. Тут ми використовуємо три окремі <img> та <map> для кращої семантики,
           хоча класична карта-зображення використовує один <img>. 
           Проте для трьох окремих фото, це більш зручний та сучасний підхід.
        */
        .photo-link-area {
            /* Контейнер для зображення, що є картою */
            position: relative;
            display: block;
        }
        
        /* Оскільки кожне зображення є посиланням на інший файл, 
            ми використаємо просту структуру посилання, що покриває все зображення, 
            і додамо атрибути usemap для відповідності завданню.
            
            Ми використовуємо 3 окремих блоки, де кожне зображення має свою власну карту <map>.
        */
    </style>
</head>
<body>

    <h1>Об'єднання файлів</h1>

    <p class="intro-text">
        Оберіть одну з категорій, клікнувши на відповідне зображення, щоб перейти до файлу лабораторної роботи.
    </p>

    <div class="gallery">

        <div class="photo-block">
            <div class="photo-link-area">
                <img class="mappable-image" 
                     src="Про мене.png" 
                     alt="Фото про мене" 
                     usemap="#MapMe"
                     width="300" height="200">
                
                <map name="MapMe">
                    <area shape="rect" 
                          coords="0,0,300,200" 
                          alt="Про мене" 
                          href="AvramenkoLab01-9.html" 
                          title="Перейти до Домашньої сторінки">
                </map>
            </div>
            <div class="photo-caption">Про Мене</div>
        </div>

        <div class="photo-block">
            <div class="photo-link-area">
                <img class="mappable-image" 
                     src="центр.jpg" 
                     alt="Фото Охтирки" 
                     usemap="#MapHomeland"
                     width="300" height="200">
                
                <map name="MapHomeland">
                    <area shape="rect" 
                          coords="0,0,300,200" 
                          alt="Батьківщина Охтирка" 
                          href="AvramenkoLab06-3.html" 
                          title="Перейти до Моєї Батьківщини">
                </map>
            </div>
            <div class="photo-caption">Моя Батьківщина</div>
        </div>

        <div class="photo-block">
            <div class="photo-link-area">
                <img class="mappable-image" 
                     src="Моя Батьківщина.png" 
                     alt="Фото гіперпосилань" 
                     usemap="#MapLinks"
                     width="300" height="200">
                
                <map name="MapLinks">
                    <area shape="rect" 
                          coords="0,0,300,200" 
                          alt="Гіперпосилання" 
                          href="AvramenkoLab05-3.html" 
                          title="Перейти до Моїх гіперпосилань">
                </map>
            </div>
            <div class="photo-caption">Мої Гіперпосилання</div>
        </div>
        
    </div>

    <footer>
        <p>Виконав: Авраменко.</p>
    </footer>

</body>
</html>
