<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практичне завдання №2: Адаптивний CSS Grid</title>
    
    <style>
        /* 1. Скидання стандартних стилів */
        * {
            /* Вимога: Блоки повинні повністю заповнювати весь вільний простір екрану */
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex; /* Для центрування головного контейнера */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            padding: 20px; /* Невеликий відступ від краю екрана */
        }

        /* 2. Стилі для головного Grid-контейнера */
        .main-container {
            display: grid;
            /* Вимога: Блоки повинні повністю заповнювати весь вільний простір. */
            width: 100%; 
            max-width: 800px; /* Обмеження ширини для кращої демонстрації */
            min-height: 300px; 
            /* Вимога: Всі елементи знаходяться в головному блоці */
        }

        /* 3. Базові стилі для всіх блоків */
        .block {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            text-align: center;
            /* Вимога: Рамка у блоків повинна бути 1px сірого або світло-сірого кольору. */
            border: 1px solid #cccccc; 
            min-height: 150px; 
        }

        /* Кольори блоків (відповідно до макета) */
        .block-1 {
            background-color: #3f83c1; /* Синій */
        }

        .block-2 {
            background-color: #ffc400; /* Жовтий */
        }

        .block-3 {
            background-color: #c4383c; /* Червоний */
        }


        /* 4. Стилі для ПК-версії (≥768px) */
        /* Це базовий макет, але для ясності його можна визначити тут */
        @media (min-width: 768px) {
            
            .main-container {
                /* Створення двох колонок: перша 100% ширини, друга розділена 50/50 */
                grid-template-columns: 1fr 1fr; 
                grid-template-rows: auto auto; /* Два рядки, висота за вмістом */
            }

            /* Розміщення блоків у Grid для ПК-версії */
            /* #1: Займає обидві колонки на першому рядку */
            .block-1 {
                grid-column: 1 / 3; /* Починається з лінії 1, закінчується лінією 3 */
                grid-row: 1;
            }

            /* #2: Займає першу колонку на другому рядку */
            .block-2 {
                grid-column: 1 / 2;
                grid-row: 2;
            }

            /* #3: Займає другу колонку на другому рядку */
            .block-3 {
                grid-column: 2 / 3;
                grid-row: 2;
            }
        }


        /* 5. Адаптація для мобільної версії (<768px) */

        /* Вимога: Використовуючи власне правило @media забезпечити зафарбовування
                   відповідних елементів під різні розміри екранів (<768px, ≥768). */

        @media (max-width: 767.99px) {
            
            .main-container {
                /* Створення однієї колонки (вертикальне розташування) */
                grid-template-columns: 1fr;
                /* Блоки автоматично займуть окремі рядки (рядок 1, 2, 3) */
            }

            /* Розміщення блоків у Grid для мобільної версії: #1, #2, #3 по порядку */
            /* Оскільки блоки в HTML вже йдуть у потрібному порядку,
               додатково вказувати grid-row необов'язково */
            
            .block-1 { grid-row: 1; grid-column: 1; }
            .block-2 { grid-row: 2; grid-column: 1; }
            .block-3 { grid-row: 3; grid-column: 1; }
            
            .block {
                min-height: 120px; /* Трохи менша висота для мобільного вигляду */
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="block block-1">
            <p>#1</p>
        </div>
        <div class="block block-2">
            <p>#2</p>
        </div>
        <div class="block block-3">
            <p>#3</p>
        </div>
    </div>
</body>
</html>
