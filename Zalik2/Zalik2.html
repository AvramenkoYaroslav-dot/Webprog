<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практичне завдання №2: Адаптивний CSS Grid (Весь екран)</title>
    
    <style>
        /* 1. Скидання стандартних стилів */
        * {
            /* Вимога: Блоки повинні повністю заповнювати весь вільний простір екрану */
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        /* ⚠️ ВИПРАВЛЕНО: Забезпечуємо повну висоту для HTML та BODY */
        html, body {
            width: 100%;
            height: 100%; /* Ключ для повного заповнення висоти */
        }

        body {
            /* ⚠️ ВИПРАВЛЕНО: Прибираємо центрування та відступи, щоб .main-container зайняв 100% */
            display: block; 
            min-height: 100vh;
            font-family: sans-serif;
            padding: 0; /* Прибрали відступ */
        }

        /* 2. Стилі для головного Grid-контейнера */
        .main-container {
            display: grid;
            /* ⚠️ ВИПРАВЛЕНО: Встановлюємо 100% ширини та висоти */
            width: 100%; 
            height: 100%; /* Тепер займає 100% висоти body */
            
            /* max-width: 800px; - ПРИБРАНО для повного заповнення екрану */
            /* min-height: 300px; - ПРИБРАНО */
        }

        /* 3. Базові стилі для всіх блоків */
        .block {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            text-align: center;
            border: 1px solid #cccccc; 
            /* min-height: 150px; - ПРИБРАНО, висота буде керуватися Grid */
        }

        /* Кольори блоків */
        .block-1 { background-color: #3f83c1; } /* Синій */
        .block-2 { background-color: #ffc400; } /* Жовтий */
        .block-3 { background-color: #c4383c; } /* Червоний */


        /* 4. Стилі для ПК-версії (≥768px) */
        
        @media (min-width: 768px) {
            
            .main-container {
                /* Створення двох колонок 50%/50% */
                grid-template-columns: 1fr 1fr; 
                /* ⚠️ ВИПРАВЛЕНО: Встановлюємо висоту рядків: 
                   #1 - 30% висоти, #2 - 70% висоти контейнера */
                grid-template-rows: 30% 70%; 
            }

            /* Розміщення блоків у Grid для ПК-версії */
            /* #1: Займає обидві колонки на першому рядку (30% висоти) */
            .block-1 {
                grid-column: 1 / 3; 
                grid-row: 1;
            }

            /* #2 та #3: Займають другий рядок (70% висоти), кожен по 50% ширини */
            .block-2 {
                grid-column: 1 / 2;
                grid-row: 2;
            }

            .block-3 {
                grid-column: 2 / 3;
                grid-row: 2;
            }
        }


        /* 5. Адаптація для мобільної версії (<768px) */

        @media (max-width: 767.99px) {
            
            .main-container {
                /* Створення однієї колонки */
                grid-template-columns: 1fr;
                /* ⚠️ ВИПРАВЛЕНО: Встановлюємо висоту кожного рядка (блока) 
                   як 1/3 від висоти контейнера (33.33%) */
                grid-template-rows: 1fr 1fr 1fr; /* Або repeat(3, 1fr) */
            }

            /* Встановлюємо порядок/розміщення, хоча він за замовчуванням правильний */
            .block-1 { grid-area: 1 / 1 / 2 / 2; } /* grid-row: 1; grid-column: 1; */
            .block-2 { grid-area: 2 / 1 / 3 / 2; } /* grid-row: 2; grid-column: 1; */
            .block-3 { grid-area: 3 / 1 / 4 / 2; } /* grid-row: 3; grid-column: 1; */
            
            /* min-height: 120px; - ПРИБРАНО, оскільки висота керується grid-template-rows */
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="block block-1">
            <p>#1</p>
        </div>
        <div class="block block-2">
            <p>#2</p>
        </div>
        <div class="block block-3">
            <p>#3</p>
        </div>
    </div>
</body>
</html>
