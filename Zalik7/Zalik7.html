<!DOCTYPE html>
<html lang="uk" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практичне завдання: Макет (≥1200px)</title>
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <style>
        /* 1. Вимога: Блоки повинні повністю заповнювати весь вільний простір екрану */
        html, body {
            height: 100%;
        }

        /* 2. Спеціальні стилі та рамки */
        .custom-block {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            /* Вимога: Рамка 1px сірого або світло-сірого кольору */
            border: 1px solid #cccccc; 
        }

        /* 3. Вимога: Колір блоків відповідно до зразку */
        .bg-blue-custom { background-color: #3f83c1 !important; } /* Синій (#1) */
        .bg-yellow-custom { background-color: #ffc400 !important; } /* Жовтий (#2) */
        .bg-red-custom { background-color: #c4383c !important; } /* Червоний (#3) */

        /* Для усунення стандартних зовнішніх відступів .row */
        .row { 
            margin-left: 0; 
            margin-right: 0; 
        }

        /* 4. Стилізація для мобільної версії (< 1200px) */
        /* На мобільному всі блоки розташовані вертикально і займають рівні частини висоти */
        .custom-block {
            min-height: 33.33vh; 
        }
        
        /* 5. Стилізація для ПК версії (>= 1200px) */
        @media (min-width: 1200px) {
            
            /* Блок #1: Фіксована висота (наприклад, 30% висоти екрану) */
            .block-1-row {
                 min-height: 30vh; /* Верхній блок займає 30% */
            }

            /* Рядок з #2 та #3: Займає весь вільний простір */
            .row-2-3 {
                height: 100%; /* Розтягується на 100% висоти свого flex-батька */
                display: flex;
            }
            
            /* Блоки #2 та #3 розтягуються на 100% висоти свого ряду */
            .col-lg-6 > .custom-block {
                height: 100%; 
                min-height: auto; /* Скасовуємо мобільний min-height */
            }
            
             .custom-block {
                min-height: auto; /* Скасовуємо мобільний min-height для #1 */
            }
        }
        
    </style>
</head>
<body class="h-100">

    <div class="container-fluid d-flex flex-column h-100 p-0">
        
        <div class="row block-1-row">
            <div class="col-12 p-0"> 
                <div class="custom-block bg-blue-custom">
                    #1
                </div>
            </div>
        </div>
        
        <div class="row row-2-3 flex-grow-1">
            
            <div class="col-12 col-lg-6 p-0"> 
                <div class="custom-block bg-yellow-custom">
                    #2
                </div>
            </div>

            <div class="col-12 col-lg-6 p-0"> 
                <div class="custom-block bg-red-custom">
                    #3
                </div>
            </div>
            
        </div>
        
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
