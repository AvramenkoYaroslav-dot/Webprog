<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 1 - Реєстрація (Task 1.12)</title>
    
    <style>
        /* ГЛОБАЛЬНІ СТИЛІ */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* СТИЛІ HEADER */
        header {
            background-color: #007bff; 
            color: white;
            padding: 10px 20px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .blog-title {
            display: flex;
            flex-direction: column;
        }

        .main-title {
            font-size: 1.5em;
            font-weight: bold;
        }

        .sub-title {
            font-size: 0.8em;
        }

        header nav a {
            color: white;
            text-decoration: none;
            margin-left: 10px;
        }

        /* СТИЛІ MAIN ТА ФОРМИ */
        main {
            flex-grow: 1; 
            padding: 40px 20px;
            display: flex;
            justify-content: center; 
            align-items: flex-start;
        }

        .registration-container {
            width: 100%;
            max-width: 400px; 
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .registration-container h3 {
            text-align: center;
            background-color: #e9ecef; 
            padding: 10px 0;
            /* Вирівнювання заголовка на всю ширину контейнера */
            margin-top: -20px; 
            margin-left: -20px;
            margin-right: -20px;
            border-bottom: 1px solid #ccc;
            font-size: 1.2em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box; 
        }

        button[type="submit"] {
            display: block;
            width: 60%; 
            padding: 10px;
            margin: 20px auto 0 auto; 
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }

        /* СТИЛІ FOOTER */
        footer {
            background-color: #343a40; 
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 0.8em;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <div class="blog-title">
            <span class="main-title">Мій особистий блог</span>
            <span class="sub-title">Власницька публікація</span>
        </div>
        <nav>
            <a href="#">Вхід</a> | <a href="#">Реєстрація</a>
        </nav>
    </header>

    <main>
        <div class="registration-container">
            <h3>Реєстрація користувача</h3>
            <form action="#" method="POST">
                
                <div class="form-group">
                    <label for="name">Прізвище, Ім'я</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="login">Логін</label>
                    <input type="text" id="login" name="login" required>
                </div>

                <div class="form-group">
                    <label for="group">Навчальна група</label>
                    <select id="group" name="group" required>
                        <option value="305" selected>304</option>
                        <option value="382">204</option>
                        <option value="383">104</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Підтвердження паролю</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>

                <button type="submit">Зареєструватись</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; Всі права захищено</p>
    </footer>
</body>
</html>
