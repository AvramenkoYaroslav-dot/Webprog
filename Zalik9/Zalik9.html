<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивний макет на чистому Flexbox</title>
    
    <style>
        /* 1. Обнулення та заповнення екрану (ВИМОГА) */
        body {
            margin: 0;
            padding: 0;
        }

        /* Головний контейнер (Використовуємо Flexbox для керування висотою і вмістом) */
        #main-container {
            display: flex;
            flex-wrap: wrap; /* Дозволяє блокам переноситися на новий рядок */
            min-height: 100vh; /* Заповнює всю висоту екрану (ВИМОГА) */
            width: 100%;
        }

        /* 2. Стилі для загальних блоків */
        .block-item {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white; 
            font-size: 2em;
            font-weight: bold;
            box-sizing: border-box; /* Рамка і padding включаються у загальну ширину/висоту */
            /* ⚠️ ВИМОГА: Рамка 1px сірого/світло-сірого кольору */
            border: 1px solid #ccc; 
            min-height: 30vh;
        }

        /* 3. Кольори блоків (ВИМОГА: за ID) */
        #block-1 { background-color: #4286f4; } /* Синій */
        #block-2 { background-color: #f4c430; } /* Жовтий */
        #block-3 { background-color: #ea4335; } /* Червоний */


        /* ========================================================== */
        /* 4. АДАПТИВНІСТЬ FLEXBOX (ПЛАНШЕТНА ВЕРСІЯ: 768px - 991.98px) */
        /* ========================================================== */
        @media (min-width: 768px) and (max-width: 991.98px) {
            /* Блок #1: 12 колонок (100% ширини) */
            #block-1 {
                width: 100%;
            }
            /* Блоки #2 та #3: по 6 колонок (50% ширини) */
            #block-2, #block-3 {
                width: 50%;
            }
        }


        /* ========================================================== */
        /* 5. АДАПТИВНІСТЬ FLEXBOX (ПК ВЕРСІЯ: 992px і більше) */
        /* ========================================================== */
        @media (min-width: 992px) {
            /* Блок #1: 8 колонок (8/12 = 66.666%) */
            #block-1 {
                width: 66.666%; 
                /* Використовуємо order: 1, щоб він залишався на початку першого рядка */
                order: 1; 
            }
            /* Блок #2: 4 колонки (4/12 = 33.333%) */
            #block-2 {
                width: 33.333%;
                /* Використовуємо order: 2, щоб він був поруч з #1 */
                order: 2;
            }
            /* Блок #3: 12 колонок (100% ширини, переноситься на новий рядок) */
            #block-3 {
                width: 100%;
                /* Використовуємо order: 3, щоб він був у кінці, на новому рядку */
                order: 3;
            }
        }
        
        /* Вигляд за замовчуванням (менше 768px): всі блоки займають 100% ширини. */
        @media (max-width: 767.98px) {
            .block-item {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="main-container">
        
        <div id="block-1" class="block-item">
            #1
        </div>

        <div id="block-2" class="block-item">
            #2
        </div>

        <div id="block-3" class="block-item">
            #3
        </div>

    </div>

</body>
</html>
