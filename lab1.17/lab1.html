<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Calculator - White Background</title>
</head>
<body>

<script>
    /**
     * ЛАБОРАТОРНА РОБОТА: Браузерний JavaScript
     * Усі елементи та стилі створені виключно через JS
     */

    // 1. НАЛАШТУВАННЯ БІЛОГО ФОНУ СТОРІНКИ
    const body = document.body;
    body.style.margin = '0';
    body.style.height = '100vh';
    body.style.display = 'flex';
    body.style.justifyContent = 'center';
    body.style.alignItems = 'center';
    body.style.backgroundColor = '#ffffff'; // Чисто білий фон
    body.style.fontFamily = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

    // 2. СТВОРЕННЯ КОРПУСУ КАЛЬКУЛЯТОРА
    const calculator = document.createElement('div');
    calculator.style.width = '320px';
    calculator.style.backgroundColor = '#000';
    calculator.style.padding = '20px';
    calculator.style.borderRadius = '40px';
    calculator.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.2)'; // М'яка тінь для об'єму на білому фоні
    calculator.style.userSelect = 'none';
    body.appendChild(calculator);

    // 3. ДИСПЛЕЙ
    const display = document.createElement('div');
    display.innerText = '0';
    display.style.color = '#fff';
    display.style.fontSize = '70px';
    display.style.fontWeight = '300';
    display.style.textAlign = 'right';
    display.style.padding = '30px 15px 10px 15px';
    display.style.minHeight = '80px';
    calculator.appendChild(display);

    // 4. СІТКА КНОПОК
    const grid = document.createElement('div');
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
    grid.style.gap = '12px';
    calculator.appendChild(grid);

    // Дані кнопок
    const buttonsData = [
        { label: 'AC', bg: '#a5a5a5', color: '#000', type: 'clear' },
        { label: '+/-', bg: '#a5a5a5', color: '#000', type: 'mod' },
        { label: '%', bg: '#a5a5a5', color: '#000', type: 'mod' },
        { label: '÷', bg: '#ff9f0a', color: '#fff', type: 'op' },
        { label: '7', bg: '#333', color: '#fff', type: 'num' },
        { label: '8', bg: '#333', color: '#fff', type: 'num' },
        { label: '9', bg: '#333', color: '#fff', type: 'num' },
        { label: '×', bg: '#ff9f0a', color: '#fff', type: 'op' },
        { label: '4', bg: '#333', color: '#fff', type: 'num' },
        { label: '5', bg: '#333', color: '#fff', type: 'num' },
        { label: '6', bg: '#333', color: '#fff', type: 'num' },
        { label: '-', bg: '#ff9f0a', color: '#fff', type: 'op' },
        { label: '1', bg: '#333', color: '#fff', type: 'num' },
        { label: '2', bg: '#333', color: '#fff', type: 'num' },
        { label: '3', bg: '#333', color: '#fff', type: 'num' },
        { label: '+', bg: '#ff9f0a', color: '#fff', type: 'op' },
        { label: '0', bg: '#333', color: '#fff', type: 'num', span: 2 },
        { label: '.', bg: '#333', color: '#fff', type: 'num' },
        { label: '=', bg: '#ff9f0a', color: '#fff', type: 'eq' }
    ];

    let currentVal = '0';
    let prevVal = '';
    let operator = null;
    let shouldReset = false;

    function calculate() {
        let result;
        const prev = parseFloat(prevVal);
        const current = parseFloat(currentVal);
        if (isNaN(prev) || isNaN(current)) return;

        switch (operator) {
            case '+': result = prev + current; break;
            case '-': result = prev - current; break;
            case '×': result = prev * current; break;
            case '÷': result = prev / current; break;
            default: return;
        }
        currentVal = result.toString();
        operator = null;
    }

    buttonsData.forEach(btnInfo => {
        const btn = document.createElement('div');
        btn.innerText = btnInfo.label;
        
        btn.style.height = '70px';
        btn.style.borderRadius = '35px';
        btn.style.backgroundColor = btnInfo.bg;
        btn.style.color = btnInfo.color;
        btn.style.display = 'flex';
        btn.style.alignItems = 'center';
        btn.style.justifyContent = 'center';
        btn.style.fontSize = '26px';
        btn.style.cursor = 'pointer';
        btn.style.transition = 'filter 0.1s';

        if (btnInfo.span) {
            btn.style.gridColumn = `span ${btnInfo.span}`;
            btn.style.justifyContent = 'flex-start';
            btn.style.paddingLeft = '30px';
        }

        btn.onmousedown = () => btn.style.filter = 'brightness(1.3)';
        btn.onmouseup = () => btn.style.filter = 'brightness(1)';

        btn.onclick = () => {
            const val = btnInfo.label;

            if (btnInfo.type === 'num') {
                if (currentVal === '0' || shouldReset) {
                    currentVal = val;
                    shouldReset = false;
                } else {
                    if (val === '.' && currentVal.includes('.')) return;
                    currentVal += val;
                }
            } else if (btnInfo.type === 'clear') {
                currentVal = '0';
                prevVal = '';
                operator = null;
            } else if (btnInfo.type === 'op') {
                operator = val;
                prevVal = currentVal;
                shouldReset = true;
            } else if (btnInfo.type === 'eq') {
                calculate();
                shouldReset = true;
            } else if (val === '+/-') {
                currentVal = (parseFloat(currentVal) * -1).toString();
            } else if (val === '%') {
                currentVal = (parseFloat(currentVal) / 100).toString();
            }

            display.innerText = currentVal.substring(0, 8);
        };

        grid.appendChild(btn);
    });

</script>
</body>
</html>
