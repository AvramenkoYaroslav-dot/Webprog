<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практичне завдання №1: Адаптивний Flexbox (Весь екран)</title>
    
    <style>
        /* 1. Скидання стандартних стилів для коректного відображення */
        * {
            /* Блоки повинні повністю заповнювати весь вільний простір екрану */
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        /* ⚠️ ВИПРАВЛЕНО: Забезпечуємо повну висоту для HTML та BODY */
        html, body {
            width: 100%;
            height: 100%; /* Це ключ для повного заповнення висоти */
        }

        body {
            /* Видаляємо justify-content: center та align-items: center, 
               оскільки тепер .main-container займає 100% */
            display: flex;
            min-height: 100vh;
            font-family: sans-serif;
            /* Забезпечуємо, що body також може бути Flex-контейнером, 
               якщо .main-container не займає 100vh */
        }

        /* 2. Стилі для головного Flex-контейнера */
        .main-container {
            display: flex;
            flex-wrap: wrap; 
            /* ⚠️ ВИПРАВЛЕНО: Встановлюємо 100% ширини та висоти viewport 
               для заповнення всього екрану */
            width: 100%; 
            height: 100%; 
            /* Видалено max-width, щоб займати весь простір */
            /* Видалено min-height: 300px; - тепер висота 100% */
        }

        /* 3. Базові стилі для всіх блоків (для ПК-версії, ≥ 1200px) */
        .block {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            text-align: center;
            border: 1px solid #cccccc; 
            flex-grow: 1; 
            /* Видалено min-height: 150px; - висота буде визначатися flex-grow 
               відповідно до вільного простору */
        }

        /* 4. Специфічні стилі та кольори для ПК-версії (≥1200px) */
        
        .block-1 {
            background-color: #3f83c1; /* Синій */
            flex-basis: 100%; /* Займає 100% ширини */
        }

        .block-2 {
            background-color: #ffc400; /* Жовтий */
            /* ⚠️ ВИПРАВЛЕНО: Додаємо flex-grow: 1, щоб блоки 2 і 3 заповнювали всю 
               доступну висоту в ряду */
            flex-grow: 1; 
            flex-basis: 50%; /* Займає 50% від ширини контейнера разом з #3 */
        }

        .block-3 {
            background-color: #c4383c; /* Червоний */
            /* ⚠️ ВИПРАВЛЕНО: Додаємо flex-grow: 1, щоб блоки 2 і 3 заповнювали всю 
               доступну висоту в ряду */
            flex-grow: 1; 
            flex-basis: 50%; 
        }

        /* 5. Адаптація для мобільної версії (<1200px) */

        @media (max-width: 1199.99px) {
            
            .main-container {
                flex-direction: column; 
                /* Видалено max-width: 400px; */
            }
            
            .block {
                flex-basis: 100%;
                /* ⚠️ ВИПРАВЛЕНО: Встановлюємо фіксовану висоту для мобільного режиму, 
                   щоб блоки мали рівний розмір, або використовуємо flex-grow */
                min-height: 33.33vh; /* Кожен блок займає 1/3 висоти екрану */
            }

            /* Кольори для мобільної версії */
            .block-1 { background-color: #3f83c1; }
            .block-2 { background-color: #ffc400; }
            .block-3 { background-color: #c4383c; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="block block-1">
            <p>#1</p>
        </div>
        <div class="block block-2">
            <p>#2</p>
        </div>
        <div class="block block-3">
            <p>#3</p>
        </div>
    </div>
</body>
</html>
