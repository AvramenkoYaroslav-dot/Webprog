<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивний макет Bootstrap</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <style>
        /* Обнулення відступів і встановлення висоти на 100% екрану */
        body {
            margin: 0;
            padding: 0;
        }
        .container-fluid, .row {
            min-height: 100vh; /* Заповнюємо всю висоту екрану */
        }

        /* 🧱 Загальні стилі блоків */
        .custom-block {
            min-height: 30vh; /* Мінімум висоти для візуалізації */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white; 
            font-size: 2em;
            font-weight: bold;
            border-radius: 0 !important;
        }

        /* 🎨 Кольори блоків */
        .block-1 { background-color: #4286f4; } /* Синій */
        .block-2 { background-color: #f4c430; } /* Жовтий */
        .block-3 { background-color: #ea4335; } /* Червоний */
    </style>
</head>
<body>

    <div class="container-fluid p-0">
        
        <div class="row g-0 align-items-stretch">
            
            <div class="col-md-12 col-lg-8">
                <div class="custom-block block-1 border border-secondary">
                    #1
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="custom-block block-2 border border-secondary">
                    #2
                </div>
            </div>

            <div class="col-md-6 col-lg-12">
                <div class="custom-block block-3 border border-secondary">
                    #3
                </div>
            </div>
        </div>
    </div>

</body>
</html>
