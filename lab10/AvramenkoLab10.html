<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивна розмітка (CSS Grid)</title>
    <style>
        /* Скидання стандартних відступів браузера */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* --- ГОЛОВНИЙ КОНТЕЙНЕР --- */
        .wrapper {
            display: grid;
            /* Висота на весь екран */
            min-height: 100vh; 
            /* Зовнішній відступ між блоками 3px */
            gap: 3px; 
            /* Базовий колір фону (щоб було видно проміжки, якщо треба) */
            background-color: #fff; 
            padding: 3px; /* Відступ від краю екрану, щоб було видно рамки */
        }

        /* --- ЗАГАЛЬНІ СТИЛІ ДЛЯ БЛОКІВ --- */
        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            /* Рамка 1px світло-сірого кольору */
            border: 1px solid #ccc; 
        }

        /* --- КОЛЬОРИ БЛОКІВ (Зразок) --- */
        .header { background-color: #FF8A80; grid-area: header; } /* Червонуватий */
        .nav    { background-color: #80D8FF; grid-area: nav; }    /* Блакитний */
        .main   { background-color: #CCFF90; grid-area: main; }   /* Зеленуватий */
        .aside  { background-color: #FFFF8D; grid-area: aside; }  /* Жовтий */
        .footer { background-color: #CFD8DC; grid-area: footer; } /* Сірий */

        /* =========================================
           АДАПТИВНІСТЬ (MEDIA QUERIES)
           ========================================= */

        /* 1. Екрани < 500px (Мобільні) */
        /* За замовчуванням (Mobile First) - всі блоки в одну колонку */
        .wrapper {
            grid-template-columns: 1fr;
            grid-template-rows: 80px 60px 1fr 100px 60px; /* Приблизні висоти */
            grid-template-areas:
                "header"
                "nav"
                "main"
                "aside"
                "footer";
        }

        /* 2. Екрани ≥ 500px */
        @media (min-width: 500px) {
            .wrapper {
                /* Дві колонки: Меню зліва, Контент справа. Хедер і Футер на всю ширину */
                grid-template-columns: 150px 1fr;
                grid-template-rows: 80px 1fr 100px 60px;
                grid-template-areas:
                    "header header"
                    "nav    main"
                    "nav    aside"
                    "footer footer";
            }
        }

        /* 3. Екрани ≥ 750px */
        @media (min-width: 750px) {
            .wrapper {
                /* Сайдбар піднімається поруч з контентом (3 колонки, але прості) */
                grid-template-columns: 150px 1fr 150px;
                grid-template-rows: 100px 1fr 80px;
                grid-template-areas:
                    "header header header"
                    "nav    main   aside"
                    "footer footer footer";
            }
        }

        /* 4. Екрани ≥ 950px */
        @media (min-width: 950px) {
            .wrapper {
                /* Змінюємо пропорції, меню і сайдбар стають ширшими */
                grid-template-columns: 200px 1fr 200px;
                grid-template-areas:
                    "header header header"
                    "nav    main   aside"
                    "footer footer footer";
            }
        }

        /* 5. Екрани ≥ 1200px */
        @media (min-width: 1200px) {
            .wrapper {
                /* Для великих екранів можна зробити складнішу сітку або змінити висоту */
                grid-template-columns: 250px 1fr 250px;
                grid-template-rows: 120px 1fr 100px;
                /* Тут структура залишається класичною, але розміри збільшуються */
                grid-template-areas:
                    "header header header"
                    "nav    main   aside"
                    "footer footer footer";
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header class="box header">Header (1)</header>
        <nav class="box nav">Menu (2)</nav>
        <main class="box main">Main Content (3)</main>
        <aside class="box aside">Sidebar (4)</aside>
        <footer class="box footer">Footer (5)</footer>
    </div>

</body>
</html>
