<!DOCTYPE html>
<html lang="uk" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практичне завдання: Адаптивний CSS Grid (Кастомний @media)</title>
    
    <style>
        /* 1. Скидання стандартних стилів та Вимога: Блоки повинні повністю заповнювати весь вільний простір екрану */
        * {
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%; /* Ключ до заповнення висоти */
        }

        /* 2. Стилі для головного Grid-контейнера */
        /* 1. Вимога: Всі елементи знаходяться в головному блоці */
        .main-container {
            display: grid;
            width: 100%;
            height: 100%; /* Займає 100% висоти body */
        }

        /* 3. Базові стилі та рамки */
        .block {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            text-align: center;
            /* Вимога: Рамка 1px сірого або світло-сірого кольору */
            border: 1px solid #cccccc; 
            transition: all 0.3s ease;
        }

        /* 4. Вимога: Колір блоків відповідно до зразку */
        .block-1 { background-color: #3f83c1; } /* Синій */
        .block-2 { background-color: #ffc400; } /* Жовтий */
        .block-3 { background-color: #c4383c; } /* Червоний */


        /* 5. Власне CSS правило @media для мобільної версії (< 768px) */
        @media (max-width: 767.99px) {
            
            /* Мобільна версія: Блоки розташовані вертикально (одна колонка) */
            .main-container {
                grid-template-columns: 1fr; /* Одна колонка */
                /* Забезпечуємо рівномірне заповнення висоти (1/3 для кожного) */
                grid-template-rows: repeat(3, 1fr); 
            }
            
            .block {
                min-height: auto;
                font-size: 24px;
            }
            /* Встановлюємо порядок, хоча він за замовчуванням правильний */
            .block-1 { grid-row: 1; }
            .block-2 { grid-row: 2; }
            .block-3 { grid-row: 3; }
        }

        /* 6. Власне CSS правило @media для ПК версії (>= 768px) */
        @media (min-width: 768px) {
            
            /* ПК версія: Блоки розташовані горизонтально (три рівні колонки) */
            .main-container {
                grid-template-columns: repeat(3, 1fr); /* Три рівні колонки */
                grid-template-rows: 1fr; /* Один рядок, який займає всю висоту */
            }

            .block {
                min-height: auto;
                font-size: 36px;
            }
            
            /* Встановлюємо горизонтальне розміщення в один рядок */
            .block-1 { grid-column: 1 / 2; grid-row: 1; }
            .block-2 { grid-column: 2 / 3; grid-row: 1; }
            .block-3 { grid-column: 3 / 4; grid-row: 1; }
        }
    </style>
</head>
<body>
    
    <div class="main-container">
        
        <div class="block block-1">
            #1
        </div>
        <div class="block block-2">
            #2
        </div>
        <div class="block block-3">
            #3
        </div>
        
    </div>

</body>
</html>
